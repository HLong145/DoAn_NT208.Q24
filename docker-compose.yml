services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: evolix_db
      MYSQL_USER: yuwkaa
      MYSQL_PASSWORD: yuwkaapassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  backend:
    build:
      context: ./Evolix_backend
    depends_on:
      - mysql
      - redis
      - kafka
    restart: unless-stopped
    environment:
      PORT: 4001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: yuwkaa
      DB_PASSWORD: yuwkaapassword
      DB_NAME: evolix_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      JWT_SECRET: nguoiyeucuayuuka
    ports:
      - "4001:4001"
    command: ["sh", "-c", "node /app/wait-for-services.mjs && npm run start:prod"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4001/api').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  frontend:
    build:
      context: ./Evolix
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:4001
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev"]

  benchmark:
    image: grafana/k6:latest
    profiles:
      - benchmark
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TOKEN: ${TOKEN}
      BASE_URL: http://backend:4001
      API_PREFIX: /api
      VUS: 100
      DURATION: 30s
      INCLUDE_FOR_YOU: "true"
    volumes:
      - ./Evolix_backend/load-test.js:/scripts/load-test.js:ro
    working_dir: /scripts
    entrypoint: ["k6"]
    command: ["run", "--vus", "100", "--duration", "30s", "load-test.js"]

volumes:
  mysql_data: